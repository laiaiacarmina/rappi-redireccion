<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iaia Carmiña en Rappi</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 50px 20px; 
      background-color: #f9f9f9;
    }
    h2 { color: #333; }
    p { color: #666; margin-bottom: 30px; font-size: 16px; }
    .btn { 
      display: inline-block; 
      padding: 18px 35px; 
      background-color: #FF441F;
      color: white; 
      text-decoration: none; 
      border-radius: 50px; 
      font-weight: bold; 
      font-size: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h2>Menú de Iaia Carmiña</h2>
  <p>Toca el botón abajo para ir directamente a nuestra tienda en la app de Rappi.</p>
  
  <a href="#" class="btn" id="manualBtn">Abrir App de Rappi</a>

  <script>
    const storeId = "361108";
    const webUrl = "https://www.rappi.com.co/restaurantes/delivery/361108-iaia-carmina";
    
    const iosScheme = "rappi://stores/" + storeId;
    const androidIntent = "intent://stores/" + storeId + "#Intent;scheme=rappi;package=com.grability.rappi;S.browser_fallback_url=" + encodeURIComponent(webUrl) + ";end";
    
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /android/i.test(userAgent);
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

    const btn = document.getElementById('manualBtn');

    // Solo preparamos el botón, CERO redirecciones automáticas
    if (isAndroid) {
        btn.href = androidIntent;
    } else if (isIOS) {
        btn.href = iosScheme;
    } else {
        btn.href = webUrl;
    }
  </script>
</body>
</html>
